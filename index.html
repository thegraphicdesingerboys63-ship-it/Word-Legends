async function loadStaffChat() {
  const body = el('forum-body'); if (!body) return;
  const canDelete = ['admin','staff-manager','owner'].includes(S.user.role);
  body.innerHTML = `
    <div style="background:rgba(201,150,12,.06);border:1px solid rgba(201,150,12,.2);border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:var(--muted)">
      🔒 <strong style="color:var(--gold)">Staff Only</strong> — This chat is private. Only mods and above can see this.
    </div>
    <div id="staff-chat-box" style="height:420px;overflow-y:auto;background:#070c18;border-radius:10px;padding:12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px;border:1px solid #1a2c4e">
      <div class="spinner" style="margin:auto"></div>
    </div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <textarea id="staff-chat-input" rows="2" placeholder="Message staff..." style="flex:1;padding:9px 13px;background:#080d1c;border:1px solid #1a2c4e;border-radius:8px;color:var(--cream);font-family:'Lato',sans-serif;font-size:.86rem;outline:none;resize:none;transition:.2s" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendStaffMessage();}"></textarea>
      <button class="btn btn-primary btn-sm" onclick="sendStaffMessage()">Send</button>
    </div>`;

  try {
    const msgs = await api('GET', '/api/staff/messages');
    const box = el('staff-chat-box');
    box.innerHTML = msgs.length
      ? msgs.map(m => staffMsgHTML(m, canDelete)).join('')
      : `<p style="color:var(--muted);margin:auto;font-size:.85rem">No messages yet.</p>`;
    box.scrollTop = box.scrollHeight;
  } catch(e) { el('staff-chat-box').innerHTML = `<p style="color:var(--danger)">${e.message}</p>`; }

  S.socket?.off('staff:chat:message');
  S.socket?.off('staff:chat:deleted');
  S.socket?.on('staff:chat:message', msg => {
    const box = el('staff-chat-box'); if (!box) return;
    const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
    const empty = box.querySelector('p');
    if (empty) box.innerHTML = '';
    box.insertAdjacentHTML('beforeend', staffMsgHTML(msg, canDelete));
    if (atBottom) box.scrollTop = box.scrollHeight;
  });
  S.socket?.on('staff:chat:deleted', ({ id }) => {
    document.getElementById(`sc-${id}`)?.remove();
  });
}

function staffMsgHTML(m, canDelete) {
  const isMe = m.author_id === S.user.id;

// Ripple effect on action cards
document.addEventListener('click', e => {
  const card = e.target.closest('.action-card');
  if (!card) return;
  const r = document.createElement('span');
  r.className = 'ripple-el';
  const rect = card.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  card.appendChild(r);
  r.addEventListener('animationend', () => r.remove());
});

// Staggered fade-in for action cards and stat cards
const _origInnerHTML = Object.getOwnPropertyDescriptor(Element.prototype, 'innerHTML');
function animateCardsIn(container) {
  const cards = container?.querySelectorAll('.action-card,.stat-card,.forum-post-card,.icon-card');
  cards?.forEach((c,i) => { c.style.animation = `fadeSlideIn .3s ease both`; c.style.animationDelay = `${i*0.04}s`; });
}
const _appObserver = new MutationObserver(() => animateCardsIn(document.getElementById('app')));
document.addEventListener('DOMContentLoaded', () => {

}

  // Staff exclusive
  staff_mod:     { colors:['#000d20','#001a50','#0050c8','#001a50'],          angle:135, staffGlow:'#0050c8' },
  staff_admin:   { colors:['#080015','#15003a','#3d00a0','#15003a'],          angle:135, staffGlow:'#6600cc' },
  staff_manager: { colors:['#150000','#3a0a00','#8c1a00','#c0392b','#ff4500'],angle:150, staffGlow:'#ff4500' },
  sovereign:     { colors:['#050300','#1a1000','#4a3200','#9a7200','#d4a017','#ffd700','#fffae0','#ffd700','#9a7200','#1a1000'], angle:135, sovereign:true },
};

function cardBgCSS(id) {
  const def = CARD_BG_DEFS[id] || CARD_BG_DEFS.default;
  if (def.sovereign) return `linear-gradient(135deg,${def.colors.join(',')})`;
  return `linear-gradient(${def.angle}deg,${def.colors.join(',')})`;
}

function cardBgStyle(id, el) {
  const def = CARD_BG_DEFS[id] || CARD_BG_DEFS.default;
  const base = `linear-gradient(${def.sovereign?135:def.angle}deg,${def.colors.join(',')})`;
  if (!el) return base;
  if (def.sovereign) {
    el.style.background = base;
    el.style.backgroundSize = '300% 300%';
    el.style.animation = 'sovereignShift 5s ease infinite, sovereignGlow 3s ease-in-out infinite';
  } else if (def.staffGlow) {
    el.style.background = base;
    el.style.boxShadow = `inset 0 0 40px ${def.staffGlow}22, 0 0 20px ${def.staffGlow}44`;
    el.style.animation = 'staffGlow 2.5s ease-in-out infinite';
  }
  return base;
}

async function loadCardBgShop() {
  const wrap = document.getElementById('card-bg-wrap'); if (!wrap) return;
  try {
    const { bgs, coins, activeBg } = await api('GET', '/api/shop/card-bgs');
    S.user.active_card_bg = activeBg;
    const rarityOrder = ['common','rare','epic'];
    const rarityLabel = {common:'Common',rare:'Rare',epic:'⚡ Epic'};

    // Separate exclusive/unique from regular
    const exclusiveBgs = bgs.filter(b => b.rarity === 'exclusive' || b.rarity === 'unique');
    const regularBgs = bgs.filter(b => b.rarity !== 'exclusive' && b.rarity !== 'unique');

    const renderBgCard = (bg) => {
      const isEquipped = activeBg === bg.id;
      const owned = bg.owned;
      const eligible = bg.eligible;
      const canAfford = coins >= bg.price;
      const preview = cardBgCSS(bg.id);
      const isSov = bg.id === 'sovereign';
      return `<div class="icon-card" id="cbg-${bg.id}" style="overflow:hidden;${isSov?'border-color:#ffd700;background:linear-gradient(135deg,#050300,#1a1000)':''}${owned&&!isSov?' border-color:rgba(255,255,255,.15)':''}">
        ${isSov?`<span class="rarity-badge" style="background:rgba(255,215,0,.2);color:#ffd700">👑 1 OF 1</span>`:`<span class="rarity-badge" style="background:rgba(100,100,200,.2);color:#8090f0">Staff</span>`}
        <div id="cbg-prev-${bg.id}" style="width:100%;height:50px;border-radius:8px;background:${preview};margin-bottom:8px;position:relative;overflow:hidden">
          <div style="position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.${isSov?'12':'07'}) 50%,transparent 60%);animation:shimmer ${isSov?'2':'3'}s linear infinite;background-size:200% auto"></div>
        </div>
        <div class="icon-name" style="${isSov?'color:#ffd700;font-family:Cinzel,serif':'color:#c0b0ff'}">${bg.name}</div>
        <div class="icon-price" style="color:#888;font-size:.7rem">${owned?'<span style="color:var(--success)">✓ Owned</span>':'Staff Exclusive'}</div>
        ${owned
          ? `<button class="btn btn-sm" style="width:100%;background:${isEquipped?'var(--gold)':'rgba(201,150,12,.15)'};border:1px solid var(--gold);color:${isEquipped?'#060810':'var(--gold)'}" onclick="equipCardBg('${bg.id}')">${isEquipped?'✓ Equipped':'Equip'}</button>`
          : eligible
            ? `<button class="btn btn-sm" style="width:100%;background:rgba(100,100,200,.15);border:1px solid #5050c0;color:#8090f0" onclick="equipCardBg('${bg.id}')">Claim Free</button>`
            : `<button class="btn btn-sm" disabled style="width:100%;opacity:.35;cursor:not-allowed">Role Required</button>`
        }
      </div>`;
    };

    let html = '';
    // Staff exclusive section
    if (exclusiveBgs.length) {
      html += `<div style="margin-bottom:28px">
        <h3 style="color:#8090f0;font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;border-bottom:1px solid rgba(100,100,200,.3);padding-bottom:6px">Staff Exclusive</h3>
        <p style="font-size:.72rem;color:#555;margin-bottom:12px">Role-gated backgrounds. Automatically granted to eligible staff members.</p>
        <div class="shop-grid">${exclusiveBgs.map(renderBgCard).join('')}</div>
      </div>`;
    }
    // Regular shop
    html += rarityOrder.map(rarity => {
      const group = regularBgs.filter(b => b.rarity === rarity);
      if (!group.length) return '';
      const rarityLabel2 = {common:'Common',rare:'Rare',epic:'⚡ Epic'};
      return `<div style="margin-bottom:24px">
        <h3 style="color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;border-bottom:1px solid #1a2c4e;padding-bottom:6px">${rarityLabel2[rarity]}</h3>
        <div class="shop-grid">
          ${group.map(bg => {
            const isEquipped = activeBg === bg.id;
            const owned = bg.owned;
            const canAfford = coins >= bg.price;
            const preview = cardBgCSS(bg.id);
            const rarColor = {common:'#95a5a6',rare:'#2980b9',epic:'#8e44ad'}[bg.rarity];
            return `<div class="icon-card rarity-${bg.rarity}${owned?' owned':''}${isEquipped?' equipped':''}" id="cbg-${bg.id}" style="overflow:hidden">
              <span class="rarity-badge" style="background:rgba(${bg.rarity==='epic'?'142,68,173':bg.rarity==='rare'?'41,128,185':'149,165,166'},.2);color:${rarColor}">${bg.rarity}</span>
              <div style="width:100%;height:50px;border-radius:8px;background:${preview};margin-bottom:8px;position:relative;overflow:hidden">
                <div style="position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%);animation:shimmer 3s linear infinite;background-size:200% auto"></div>
              </div>
              <div class="icon-name">${bg.name}</div>
              <div class="icon-price">${owned?'<span style="color:var(--success)">✓ Owned</span>':bg.price===0?'Free':`🪙 ${bg.price.toLocaleString()}`}</div>
              ${owned
                ? `<button class="btn btn-sm" style="width:100%;background:${isEquipped?'var(--gold)':'rgba(201,150,12,.15)'};border:1px solid var(--gold);color:${isEquipped?'#060810':'var(--gold)'}" onclick="equipCardBg('${bg.id}')">${isEquipped?'✓ Equipped':'Equip'}</button>`
                : `<button class="btn btn-sm btn-primary" style="width:100%;opacity:${canAfford?1:.45}" onclick="buyCardBg('${bg.id}')"${canAfford?'':' title="Not enough coins"'}>Buy</button>`
              }
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }).join('');
    wrap.innerHTML = html;
    // Apply live animations to staff/sovereign preview thumbnails
    exclusiveBgs.forEach(bg => {
      const prev = document.getElementById(`cbg-prev-${bg.id}`);
      if (prev) cardBgStyle(bg.id, prev);
    });
  } catch(e) { wrap.innerHTML = `<p style="color:var(--danger)">${e.message}</p>`; }
}

window.buyCardBg = async (id) => {
  try {
    const { coins } = await api('POST', `/api/shop/card-bgs/${id}/buy`);
    S.user.coins = coins; renderNav();
    toast('Card background purchased! 🎉', 'success');
    loadCardBgShop();
  } catch(e) { toast(e.message, 'error'); }
};
window.equipCardBg = async (id) => {
  try {
    await api('POST', `/api/shop/card-bgs/${id}/equip`);
    S.user.active_card_bg = id;
    toast('Background equipped!', 'success');
    loadCardBgShop();
  } catch(e) { toast(e.message, 'error'); }
};

// ═══ BACKGROUND MUSIC ═════════════════════════════════════════════════════════
// ═══ SOUND EFFECTS ════════════════════════════════════════════════════════════
const SFX = (() => {
  let ctx;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function tone(freq, type, dur, vol, delay=0, ramp=true) {
    const c = getCtx();
    const o = c.createOscillator();
    const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    const t = c.currentTime + delay;
    g.gain.setValueAtTime(vol, t);
    if (ramp) g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.start(t); o.stop(t + dur + 0.01);
  }
  return {
    click() { tone(600, 'sine', 0.04, 0.12); },
    wordFound() {
      tone(523, 'sine', 0.08, 0.18, 0);
      tone(659, 'sine', 0.08, 0.18, 0.07);
      tone(784, 'sine', 0.12, 0.2, 0.14);
    },
    levelComplete() {
      [523,659,784,1047].forEach((f,i) => tone(f,'sine',0.15,0.22,i*0.1));
      tone(1047,'sine',0.4,0.28,0.45);
    },
    rankUp() {
      [392,494,587,740,988].forEach((f,i) => tone(f,'sine',0.18,0.25,i*0.09));
      tone(988,'triangle',0.6,0.3,0.5);
    },
    error() { tone(200,'sawtooth',0.12,0.1); },
    bonus() {
      tone(880,'sine',0.07,0.15,0);
      tone(1100,'sine',0.07,0.15,0.06);
    },
  };
})();

// Patch buttons to play click sound
document.addEventListener('click', e => {
  if (e.target.closest('.btn,.action-card,.nav-link,.tab-btn')) SFX.click();
});

const Music = (() => {
  let ctx, masterGain, reverbGain, dryGain, reverbNode;
  let playing = false, scheduled = [], beatIdx = 0, loopTimer = null;

  const BPM = 68;
  const BEAT = 60 / BPM;
  const BAR = BEAT * 4;

  // Am - F - C - G chord progression (freq arrays: root, third, fifth, seventh)
  const CHORDS = [
    [220.00, 261.63, 329.63, 392.00],  // Am  (A3 C4 E4 G4)
    [174.61, 220.00, 261.63, 329.63],  // F   (F3 A3 C4 E4)
    [261.63, 329.63, 392.00, 493.88],  // C   (C4 E4 G4 B4)
    [196.00, 246.94, 293.66, 369.99],  // G   (G3 B3 D4 F#4)
  ];

  // Pentatonic melody notes over the progression (relative freqs)
  const MELODY = [
    [440.00, 392.00, 440.00, 392.00, 329.63, 392.00, 329.63, 293.66],
    [349.23, 329.63, 349.23, 329.63, 293.66, 261.63, 293.66, 329.63],
    [523.25, 493.88, 440.00, 392.00, 440.00, 392.00, 349.23, 329.63],
    [392.00, 369.99, 392.00, 349.23, 329.63, 293.66, 329.63, 392.00],
  ];

  function buildReverb(ctx) {
    const dur = 2.8, decay = 2.2;
    const sr = ctx.sampleRate, len = sr * dur;
    const buf = ctx.createBuffer(2, len, sr);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++)
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
    const conv = ctx.createConvolver();
    conv.buffer = buf;
    return conv;
  }

  function osc(freq, type, startT, dur, gainAmt, detune = 0) {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = type;
    o.frequency.value = freq;
    if (detune) o.detune.value = detune;
    g.gain.setValueAtTime(0, startT);
    g.gain.linearRampToValueAtTime(gainAmt, startT + 0.06);
    g.gain.exponentialRampToValueAtTime(gainAmt * 0.6, startT + dur * 0.5);
    g.gain.exponentialRampToValueAtTime(0.0001, startT + dur - 0.04);
    o.connect(g);
    g.connect(dryGain);
    g.connect(reverbGain);
    o.start(startT);
    o.stop(startT + dur);
    scheduled.push(o, g);
  }

  function scheduleBar(barStart, chordIdx) {
    const ch = CHORDS[chordIdx];
    const mel = MELODY[chordIdx];

    // Bass — root + fifth, staggered
    osc(ch[0] / 2, 'sine', barStart, BAR * 0.9, 0.28);
    osc(ch[2] / 2, 'sine', barStart + BAR * 0.5, BAR * 0.4, 0.14);

    // Pad — triangle waves, slight detune for warmth
    for (let i = 0; i < ch.length; i++) {
      osc(ch[i], 'triangle', barStart + 0.01, BAR * 0.85, 0.055, i % 2 === 0 ? -4 : 4);
    }

    // Melody — 8 eighth-note slots per bar
    for (let n = 0; n < 8; n++) {
      const t = barStart + n * BEAT * 0.5;
      // Skip some notes for rhythmic feel
      if ([1, 3, 5].includes(n) && Math.random() < 0.35) continue;
      osc(mel[n], 'sine', t, BEAT * 0.42, 0.095);
    }

    // Shimmer — high overtone
    if (chordIdx % 2 === 0) {
      osc(ch[1] * 2, 'sine', barStart, BAR * 0.5, 0.022);
    }
  }

  function scheduleLoop(startTime) {
    const lookahead = BAR * 4 + 0.3;
    let t = startTime;
    for (let i = 0; i < 4; i++) {
      scheduleBar(t, i);
      t += BAR;
    }
    // Schedule next loop
    const delay = (t - ctx.currentTime - 0.2) * 1000;
    loopTimer = setTimeout(() => { if (playing) scheduleLoop(t); }, Math.max(delay, 100));
  }

  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.55;
    dryGain = ctx.createGain(); dryGain.gain.value = 0.72;
    reverbGain = ctx.createGain(); reverbGain.gain.value = 0.38;
    reverbNode = buildReverb(ctx);
    dryGain.connect(masterGain);
    reverbGain.connect(reverbNode);
    reverbNode.connect(masterGain);
    masterGain.connect(ctx.destination);
  }

  function start() {
    init();
    if (ctx.state === 'suspended') ctx.resume();
    playing = true;
    scheduleLoop(ctx.currentTime + 0.1);
  }

  function stop() {
    playing = false;
    if (loopTimer) { clearTimeout(loopTimer); loopTimer = null; }
    scheduled.forEach(n => { try { n.stop?.(); n.disconnect?.(); } catch {} });
    scheduled = [];
    if (masterGain) {
      masterGain.gain.setValueAtTime(masterGain.gain.value, ctx.currentTime);
      masterGain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
    }
  }

  return { start, stop, get playing() { return playing; } };
})();

// Music toggle button state
let _musicOn = localStorage.getItem('musicOn') !== 'false';

function musicToggle() {
  _musicOn = !_musicOn;
  localStorage.setItem('musicOn', _musicOn);
  const btn = document.getElementById('music-btn');
  if (btn) btn.textContent = _musicOn ? '🎵' : '🔇';
  if (_musicOn) Music.start(); else Music.stop();
}

// Auto-start on first interaction if pref is on
function initMusicOnInteraction() {
  if (_musicOn && !Music.playing) {
    Music.start();
  }
  document.removeEventListener('click', initMusicOnInteraction);
  document.removeEventListener('keydown', initMusicOnInteraction);
}
document.addEventListener('click', initMusicOnInteraction);
document.addEventListener('keydown', initMusicOnInteraction);
</script>
